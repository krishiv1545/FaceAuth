{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | FaceAuth</title>
    <link rel="stylesheet" href="{% static 'dashboard.css' %}" />
    <style>
        :root {
            --sap-bg: #f5f6f7;
            --sap-shell: #354a5f;
            --sap-brand: #0854a0;
            --sap-card-bg: #ffffff;
            --sap-text: #32363a;
            --sap-border: #d8d8d8;
        }
        {% if primary %}
            :root {
                --sap-shell: {{ primary }};
            }
        {% endif %}
        {% if secondary %}
            :root {
                --sap-bg: {{ secondary }};
            }
        {% endif %}
        {% if tertiary %}
            :root {
                --sap-brand: {{ tertiary }};
            }
        {% endif %}
    </style>
</head>
<body>
<header class="sap-header">
    <div class="logo"><img src="{{ organization.logo.url }}" class="logo-image">{{ organization.name }}</div>
    <nav>
        <a href="{% url 'admin_dashboard' %}"><span class="navbar-item active">Entry/Exit</span></a>
        <a href="{% url 'add_student' %}"><span class="navbar-item">Add Student</span></a>
        <span class="navbar-item" onclick="confirmLogout()">Logout</span>
    </nav>
</header>

<main class="container">
    <section class="card">
        <div class="card-header">
            <h3>Face Authentication</h3>
            <span class="status-pill" id="status">Standby</span>
        </div>
        
        <div class="viewport">
            <video id="camera" autoplay playsinline></video>
            <canvas id="snapshot" style="display:none;"></canvas>
            <div class="scanner-overlay"></div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="startCamera()">Scan</button>
            <button class="btn-secondary" onclick="stopCamera()">Stop</button>
        </div>
    </section>

    <section class="card" id="studentCard">
        <div class="card-header">
            <h3>Log Entry/Exit</h3>
        </div>
        
        <div class="student-details">
            <div class="student-id">

                <div class="student-info">
                    <h3 id="studentName"></h3>

                    <div class="student-field">
                        <span class="label">Enrollment #</span>
                        <span id="studentEnroll"></span>
                    </div>

                    <div class="student-field">
                        <span class="label">Email</span>
                        <span id="studentEmail"></span>
                    </div>

                    <div class="student-field">
                        <span class="label">Institute</span>
                        <span id="studentInstitute">{{ organization.name }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="logEntry()">Entry</button>
            <button class="btn-primary" onclick="logExit()">Exit</button>
        </div>
    </section>
</main>

<script>
const video = document.getElementById("camera");
const status = document.getElementById("status");

let scanningInterval = null

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        video.srcObject = stream
        status.textContent = "Scanning..."
        status.style.background = "#e7f4e9"

        scanningInterval = setInterval(scanFrame, 1500)
    })
}

function stopCamera() {
    const stream = video.srcObject

    if(stream){
        stream.getTracks().forEach(track => track.stop())
        video.srcObject = null
    }

    if(scanningInterval){
        clearInterval(scanningInterval)
        scanningInterval = null
    }

    status.textContent = "Standby"
    status.style.background = "#f0f2f5"
}

async function scanFrame(){

    const canvas = document.getElementById("snapshot")
    const ctx = canvas.getContext("2d")

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height)

    const imageData = canvas.toDataURL("image/jpeg")

    const response = await fetch("/api/recognize-face/",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            image: imageData
        })
    })

    const data = await response.json()

    if(data.match){

        stopCamera()   // stops scanning and camera

        const card = document.getElementById("studentCard")
        card.style.display = "block"

        document.getElementById("studentName").textContent = data.student.full_name
        document.getElementById("studentEnroll").textContent = data.student.enrollment
        document.getElementById("studentEmail").textContent = data.student.email
    }
}
</script>

<script>
function confirmLogout() {
    window.location.href = "{% url 'logout' %}";
}
</script>

</body>
</html>
