{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | FaceAuth</title>
    <link rel="stylesheet" href="{% static 'dashboard.css' %}" />
    <style>
        .card {
            max-width: 1000px;
        }
    </style>
    <style>
        :root {
            --sap-bg: #f5f6f7;
            --sap-shell: #354a5f;
            --sap-brand: #0854a0;
            --sap-card-bg: #ffffff;
            --sap-text: #32363a;
            --sap-border: #d8d8d8;
        }
        {% if primary %}
            :root {
                --sap-shell: {{ primary }};
            }
        {% endif %}
        {% if secondary %}
            :root {
                --sap-bg: {{ secondary }};
            }
        {% endif %}
        {% if tertiary %}
            :root {
                --sap-brand: {{ tertiary }};
            }
        {% endif %}
    </style>
</head>
<body>
<header class="sap-header">
    <div class="logo"><img src="{{ organization.logo.url }}" class="logo-image">{{ organization.name }}</div>
    <nav>
        <a href="{% url 'admin_dashboard' %}"><span class="navbar-item">Entry/Exit</span></a>
        <a href="{% url 'add_student' %}"><span class="navbar-item active">Add Student</span></a>
        <span class="navbar-item" onclick="confirmLogout()">Logout</span>
    </nav>
</header>

<main class="container">
    <section class="card">
        <div class="card-header">
            <h3>Add Student</h3>
        </div>
        
        <form id="addStudentForm" enctype="multipart/form-data">
        <div class="add-student-form">
            <div class="form-column">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
            </div>

            <div class="form-column">
                <section class="card">
                    <div class="card-header">
                        <h3>Biometric Face Capture</h3>
                        <span class="status-pill" id="status">Standby</span>
                    </div>
                    
                    <div class="viewport">
                        <video id="camera" autoplay playsinline></video>
                        <canvas id="snapshot" style="display:none;"></canvas>
                        <img id="preview" style="display:none;width:100%;height:100%;object-fit:cover;">
                        <div class="scanner-overlay"></div>
                    </div>

                    <div class="controls">
                        <button type="button" class="btn-secondary" onclick="captureFace()" id="captureBtn">Capture</button>
                    </div>
                </section>
            </div>
        </div>

        <div class="controls">
            <button type="submit" class="btn-primary" id="registerBtn">Register</button>
        </div>
        </form>

    </section>
</main>

<div id="toast" class="toast"></div>

<script>
const video = document.getElementById("camera");
const status = document.getElementById("status");
const captureBtn = document.getElementById("captureBtn");

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        video.srcObject = stream;
        status.textContent = "Live";
        status.style.background = "#e7f4e9";
        status.style.color = "#1e6332";
    })
    .catch(err => {
        console.error("Camera access denied", err);
        status.textContent = "Error";
    });
}

startCamera()

function stopCamera(){
    const stream = video.srcObject
    if(stream){
        stream.getTracks().forEach(track => track.stop())
    }
}

function restartCamera(){
    document.getElementById("preview").style.display = "none"
    video.style.display = "block"
    startCamera()
}
</script>

<script>
function confirmLogout() {
    window.location.href = "{% url 'logout' %}";
}
</script>

<script>
let biometricCaptured = false
let faceEmbedding = null

async function captureFace(){

    const canvas = document.getElementById("snapshot")
    const ctx = canvas.getContext("2d")
    const preview = document.getElementById("preview")

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height)

    const imageData = canvas.toDataURL("image/jpeg")

    status.textContent = "Processing..."
    status.style.background = "#fff4e5"
    status.style.color = "#7a4b00"

    try {

        const response = await fetch("/api/biometric-capture/",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ image: imageData })
        })

        const data = await response.json()

        if(response.ok){

            faceEmbedding = data.embedding
            biometricCaptured = true

            preview.src = imageData
            preview.style.display = "block"
            video.style.display = "none"

            stopCamera()

            status.textContent = "Face Captured"
            status.style.background = "#e7f4e9"
            status.style.color = "#1e6332"

            captureBtn.textContent = "Capture Again"

            document.getElementById("registerBtn").disabled = false

        }else{
            throw new Error(data.error)
        }

    }catch(err){
        status.textContent = "Capture Failed"
        status.style.background = "#ffe6e6"
        status.style.color = "#a40000"

        showToast("Face detection failed. Try again.", "error")
    }

}

captureBtn.addEventListener("click", () => {

    if(biometricCaptured){
        biometricCaptured = false
        faceEmbedding = null

        status.textContent = "Standby"
        status.style.background = "#f0f2f5"
        status.style.color = "#6a6d70"

        captureBtn.textContent = "Capture"

        restartCamera()

    }else{
        captureFace()
    }

})

document.getElementById("addStudentForm").addEventListener("submit", function(e){

    if(!biometricCaptured){
        e.preventDefault()
    }

})

function showToast(message, type="success") {

    const toast = document.getElementById("toast")

    toast.textContent = message
    toast.className = "toast show " + type

    setTimeout(() => {
        toast.className = "toast"
    }, 3000)
}
</script>

<script>
document.getElementById("addStudentForm").addEventListener("submit", async function(e){

    e.preventDefault()

    if(!faceEmbedding){
        showToast("Please capture biometric face data first.", "error")
        return
    }

    const formData = new FormData(this)
    formData.append("embedding", JSON.stringify(faceEmbedding))

    const response = await fetch("/api/add-student/",{
        method:"POST",
        body: formData
    })

    const data = await response.json()

    if(response.ok){
        showToast("Student registered successfully", "success")

        setTimeout(()=>{
            location.reload()
        }, 1200)

    }else{
        showToast(data.error || "Registration failed", "error")
    }

})
</script>

</body>
</html>
